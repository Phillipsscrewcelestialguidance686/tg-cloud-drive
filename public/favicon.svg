<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="100%" height="100%">
  <defs>
    <!-- Background Gradient: Brand Blue to Indigo -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#24A1DE" />
      <stop offset="100%" stop-color="#4F46E5" />
    </linearGradient>

    <!-- Cloud Fill Gradient -->
    <linearGradient id="cloudGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.95" />
      <stop offset="100%" stop-color="#E0E7FF" stop-opacity="0.85" />
    </linearGradient>

    <!-- Glow Filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Background Sphere with Drop Shadow -->
  <circle cx="64" cy="64" r="60" fill="url(#bgGrad)" filter="drop-shadow(0px 8px 16px rgba(36, 161, 222, 0.3))" />

  <!-- Outer Ring (Glassmorphism Effect) -->
  <circle cx="64" cy="64" r="56" fill="none" stroke="#FFFFFF" stroke-opacity="0.15" stroke-width="2.5" />

  <!-- Cloud Shape (The Cloud aspect) -->
  <path d="M42 80c-5.52 0-10-4.48-10-10 0-4.88 3.5-8.94 8.2-9.82C41.4 51.78 49.38 46 58.5 46c8.07 0 15.22 4.45 18 11.02 1.34-.63 2.85-.98 4.45-.98 5.52 0 10 4.48 10 10s-4.48 10-10 10H42z" 
        fill="url(#cloudGrad)" 
        filter="drop-shadow(0 4px 6px rgba(0, 0, 0, 0.15))" />

  <!-- Minimalist Telegram Paper Plane (The Telegram aspect) -->
  <!-- Shifted slightly right and tilted upward for dynamic flight feel -->
  <path d="M51 68l24-15.5L46.5 61l.5 9.5 4-2.5z" 
        fill="#24A1DE" />
  <path d="M75 52.5L46.5 61l15.5 5.5 13-14z" 
        fill="#38BDF8" />
</svg>